# Grafana Tempo — trace storage backend for the local kind stack. Receives
# OTLP spans from the Waybill app and lets you view full request traces in
# Grafana alongside the metrics dashboards. Minimal single-binary config; a real
# cluster would use the tempo-distributed Helm chart with object storage.
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: monitoring
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            http:
            grpc:
    storage:
      trace:
        backend: local
        local:
          path: /tmp/tempo/blocks
        wal:
          path: /tmp/tempo/wal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels: { app: tempo }
  template:
    metadata:
      labels: { app: tempo }
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.6.0
          args: ["-config.file=/etc/tempo/tempo.yaml"]
          ports:
            - { containerPort: 3200, name: http }
            - { containerPort: 4318, name: otlp-http }
            - { containerPort: 4317, name: otlp-grpc }
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
      volumes:
        - name: config
          configMap: { name: tempo-config }
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: monitoring
spec:
  selector: { app: tempo }
  ports:
    - { port: 3200, targetPort: 3200, name: http }
    - { port: 4318, targetPort: 4318, name: otlp-http }
    - { port: 4317, targetPort: 4317, name: otlp-grpc }
