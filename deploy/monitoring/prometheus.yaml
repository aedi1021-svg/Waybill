# Prometheus for the local kind stack. Scrapes the Waybill service's /metrics
# endpoint. Deliberately minimal — one scrape job, in-memory storage — because
# this is for local demonstration, not long-term retention. In a real cluster
# you'd use the kube-prometheus-stack Helm chart with a ServiceMonitor CRD; the
# note at the bottom explains that upgrade path.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: waybill
        metrics_path: /metrics
        # Discover Waybill pods by label and scrape each one.
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: waybill
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: "8000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector: { app: prometheus }
  ports:
    - port: 9090
      targetPort: 9090
