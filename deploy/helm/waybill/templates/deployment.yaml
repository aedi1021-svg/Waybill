apiVersion: v1
kind: ConfigMap
metadata:
  name: waybill-config
  labels:
    {{- include "waybill.labels" . | nindent 4 }}
data:
  ESCALATION_THRESHOLD: {{ .Values.config.escalationThreshold | quote }}
  OLLAMA_HOST: {{ .Values.config.ollamaHost | quote }}
  OLLAMA_MODEL: {{ .Values.config.ollamaModel | quote }}
  OTEL_ENABLED: {{ .Values.config.otelEnabled | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.otelEndpoint | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: waybill-secrets
  labels:
    {{- include "waybill.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "waybill.databaseUrl" . | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: waybill
  labels:
    {{- include "waybill.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "waybill.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "waybill.name" . }}
    spec:
      containers:
        - name: waybill
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: waybill-config
            - secretRef:
                name: waybill-secrets
          # Liveness: cheap, process-only. Failure restarts the pod.
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          # Readiness: checks DB + LLM. Failure pulls pod from the Service
          # endpoints (no traffic) until deps recover — no restart.
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
