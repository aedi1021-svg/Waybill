{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: waybill-postgres
  labels:
    {{- include "waybill.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: waybill-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: waybill-postgres
  labels:
    {{- include "waybill.labels" . | nindent 4 }}
spec:
  serviceName: waybill-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: waybill-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: waybill-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
{{- end }}
