name: deploy-cloudrun

# Continuous deployment to Cloud Run. Runs only after CI (including the eval
# gate) passes on main. This is the "push to main -> live in production" story
# for the always-on public service.
#
# Required repo secrets:
#   GCP_PROJECT             your GCP project id
#   GCP_WORKLOAD_IDENTITY   workload identity provider (recommended over keys)
#   GCP_SERVICE_ACCOUNT     deploy service account email
#   DATABASE_URL            managed Postgres connection string (Neon/Supabase)
on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    # Only deploy if the CI run (with the eval gate) actually succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Store DB URL secret
        run: |
          echo -n "${{ secrets.DATABASE_URL }}" | \
            gcloud secrets versions add waybill-db-url --data-file=- \
            --project ${{ secrets.GCP_PROJECT }} || \
          echo -n "${{ secrets.DATABASE_URL }}" | \
            gcloud secrets create waybill-db-url --data-file=- \
            --project ${{ secrets.GCP_PROJECT }}

      - name: Run migration job
        run: |
          gcloud run jobs deploy waybill-migrate \
            --image ghcr.io/${{ github.repository }}:latest \
            --region us-central1 --project ${{ secrets.GCP_PROJECT }} \
            --set-secrets DATABASE_URL=waybill-db-url:latest \
            --args=migrate --execute-now --wait

      - name: Deploy service
        run: |
          gcloud run deploy waybill \
            --image ghcr.io/${{ github.repository }}:latest \
            --region us-central1 --project ${{ secrets.GCP_PROJECT }} \
            --platform managed --allow-unauthenticated \
            --port 8000 --args=serve,--host,0.0.0.0,--port,8000 \
            --set-env-vars ESCALATION_THRESHOLD=0.75 \
            --set-secrets DATABASE_URL=waybill-db-url:latest \
            --min-instances 0 --max-instances 4 --memory 512Mi
