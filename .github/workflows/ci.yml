name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Ruff lint
        run: ruff check waybill

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Unit tests
        run: pytest -q

  eval-gate:
    # The MLOps gate. If the agent regresses below the committed thresholds in
    # eval_thresholds.json, this job fails and nothing downstream runs — the
    # image is never built, the deploy never happens.
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run eval gate
        run: python -m waybill.eval.gate --n 300
      - name: Upload eval report
        if: always()
        run: python -m waybill.cli eval -n 300 > eval-report.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: eval-report.json

  train-model:
    # The model lifecycle in CI: train the classifier, log it to MLflow, and
    # eval-gate its promotion. If the trained model doesn't clear the accuracy
    # threshold, this job fails — a bad model is versioned but never promoted.
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt -r requirements-ml.txt
      - name: Train + register + gate promotion
        run: python -m waybill.ml.train_register
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mlruns
          path: mlruns

  build:
    # Only builds if lint, test, the eval gate, AND model training all pass.
    needs: [lint, eval-gate, train-model]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
